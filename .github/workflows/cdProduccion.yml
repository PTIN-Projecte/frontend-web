# ===================================
# cdProduction.yml (CORREGIDO)
# ===================================
name: CD Production

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy-production:
    runs-on: self-hosted
    environment: production
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout del tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Download artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: cicdTesting.yml
          name: digest-front-${{ github.sha }}  # FIX #1: era "digest-back-", ahora coincide con cicdTesting.yml
          workflow_conclusion: success

      - name: Leer metadata
        id: metadata
        run: |
          DIGEST=$(cat digest-front.txt)
          TAG=$(cat tag-front.txt)
          COMMIT=$(cat commit-sha.txt)
          echo "DIGEST=${DIGEST}" >> $GITHUB_OUTPUT
          echo "TEST_TAG=${TAG}" >> $GITHUB_OUTPUT
          echo "COMMIT_SHA=${COMMIT}" >> $GITHUB_OUTPUT
          echo "📦 Promocionando imagen de testing:"
          echo "  Commit: ${COMMIT}"
          echo "  Tag testing: ${TAG}"
          echo "  Digest: ${DIGEST}"

      - name: Extraer versión del tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Re-tag imagen para producción
        run: |
          echo "🔄 Promocionando imagen validada en testing..."
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/catering-frontend-dev@${{ steps.metadata.outputs.DIGEST }}
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/catering-frontend-dev@${{ steps.metadata.outputs.DIGEST }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/catering-frontend:${{ steps.version.outputs.VERSION }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/catering-frontend:${{ steps.version.outputs.VERSION }}
          echo "✅ Imagen publicada: catering-frontend:${{ steps.version.outputs.VERSION }}"
          # FIX #2: era "catering-front-dev" (typo), ahora "catering-frontend-dev"

      - name: Checkout Infraestructura
        uses: actions/checkout@v4
        with:
          repository: 'PTIN-projecte/infrastructure-devops'
          path: infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Helm deploy production
        id: helm_deploy
        run: |
          export KUBECONFIG=/home/github-runner/actions-runner/.kube/config-prod
          cd infra/Kubernetes/ptincatering
          helm upgrade --install ptin-prod . \
            -f values.yaml \
            -f values-prod.yaml \
            --namespace prod \
            --set front.image.tag=${{ steps.version.outputs.VERSION }} \
            --wait \
            --timeout 5m0s

      - name: Rollback production deployment
        if: failure() && steps.helm_deploy.outcome == 'failure'
        run: |
          export KUBECONFIG=/home/github-runner/actions-runner/.kube/config-prod
          cd infra/Kubernetes/ptincatering
          if helm history ptin-prod --namespace prod >/dev/null 2>&1; then
            echo "⚠️ Rollback activado..."
            helm rollback ptin-prod --namespace prod --wait --timeout 5m0s
            echo "✅ Rollback completado"
          fi