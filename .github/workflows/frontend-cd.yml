name: Frontend CD Testing

on:
  workflow_run:
    workflows: ["Frontend CI"]
    types: [completed]
    branches: [main] 

jobs:
  build-and-push:
    name: 🐳 Build & Push imagen
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      tag: ${{ steps.tag.outputs.TAG }}
    steps:
      
      - name: Checkout Frontend
        uses: actions/checkout@v4

      - name: Generar tag
        id: tag
        run: echo "TAG=v${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Descargar dist del CI
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
        
      - name: Checkout DevOps Repo
        uses: actions/checkout@v4
        with:
          repository: PTIN-Projecte/infrastructure-devops
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra-repo 

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push imagen
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          
          file: ./infra-repo/FrontDockerfile
          push: true
          tags: ptincatering/catering-frontend:${{ steps.tag.outputs.TAG }}

      - name: Guardar digest como artefacto
        run: echo "${{ steps.build.outputs.digest }}" > digest-front.txt

      - name: Upload artefacto digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-front
          path: digest-front.txt

  deploy-testing:
    name: 🚀 Deploy a Testing
    needs: [build-and-push]
    runs-on: self-hosted
    environment: testing
    steps:
      # Volvemos a bajar el repo de infra para tener los Charts de Helm actualizados
      - name: Checkout Infra Repo
        uses: actions/checkout@v4
        with:
          repository: PTIN-Projecte/infrastructure-devops
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra-repo

      - name: Helm deploy testing
        run: |
          export KUBECONFIG=/home/github-runner/actions-runner/.kube/config-testing
          # Ajustamos la ruta según tu estructura: carpeta 'infra-repo' > 'Kubernetes' > 'ptincatering'
          cd infra-repo/Kubernetes/ptincatering
          
          helm upgrade --install ptin-test . \
            -f values.yaml \
            -f values-dev.yaml \
            --namespace testing \
            --create-namespace \
            --set ptin-front.image.tag=${{ needs.build-and-push.outputs.tag }} \
            --wait