name: CI y CD (Testing)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ci:
    name: 🔍 Lint + 🏗️ Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
        
      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar ESLint
        run: npm run lint
        
      - name: Compilar la aplicación
        run: npm run build

  build-and-push:
    needs: [ci]
    runs-on: ubuntu-latest
    outputs:
      TAG: ${{ steps.tag.outputs.TAG }}
      DIGEST: ${{ steps.build.outputs.digest }}
      COMMIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Infraestructura
        uses: actions/checkout@v4
        with:
          repository: 'PTIN-projecte/infrastructure-devops'
          path: infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}

      - name: Generar tag
        id: tag
        run: echo "TAG=v${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push imagen
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/FrontDockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/catering-frontend-dev:${{ steps.tag.outputs.TAG }}

      - name: Guardar metadata como artifact
        run: |
          echo "${{ steps.build.outputs.digest }}" > digest-front.txt
          echo "${{ steps.tag.outputs.TAG }}" > tag-front.txt
          echo "${{ github.sha }}" > commit-sha.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-back-${{ github.sha }}
          path: |
            digest-front.txt
            tag-front.txt
            commit-sha.txt
          retention-days: 30

  deploy-testing:
    needs: [build-and-push]
    runs-on: self-hosted
    environment: testing
    steps:
      - name: Checkout Infraestructura
        uses: actions/checkout@v4
        with:
          repository: 'PTIN-projecte/infrastructure-devops'
          path: infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          persist-credentials: false

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Helm deploy testing
        run: |
          export KUBECONFIG=/home/github-runner/actions-runner/.kube/config-testing
          cd infra/Kubernetes/ptincatering
          helm upgrade --install ptin-test . \
            -f values.yaml \
            -f values-dev.yaml \
            --namespace testing \
            --set front.image.tag=${{ needs.build-and-push.outputs.TAG }}